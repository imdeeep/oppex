# Database — values come from environment variables (or .env in dev mode).
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_JDBC_URL}

quarkus.hibernate-orm.schema-management.strategy=update

quarkus.http.port=8080

# SMTP — Brevo (recommended) or Gmail App Password
quarkus.mailer.from=${MAIL_FROM}
quarkus.mailer.host=${MAIL_HOST:smtp-relay.brevo.com}
quarkus.mailer.port=${MAIL_PORT:587}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${MAIL_USERNAME}
quarkus.mailer.password=${MAIL_PASSWORD}
quarkus.mailer.login=REQUIRED
app.mailer.from=${MAIL_FROM}

# Print verification code in the Quarkus terminal during local dev.
%dev.app.mailer.log-code-in-dev=true

# Quarkus mocks the mailer by default in dev mode (it only logs the email
# instead of sending it). Force real SMTP delivery during local dev.
%dev.quarkus.mailer.mock=false

%dev.quarkus.hibernate-orm.log.sql=true

# Test profile: in-memory H2 so tests never hit Neon.
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:oppex_test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.mailer.mock=true
