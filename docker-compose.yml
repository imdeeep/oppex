services:
  server:
    build: ./server
    env_file: ./server/.env
    expose:
      - "8080"
    restart: unless-stopped

  node-proxy:
    build: ./node-proxy
    env_file: ./node-proxy/.env
    expose:
      - "3000"
    depends_on:
      - server
    restart: unless-stopped

  frontend:
    build: ./client
    expose:
      - "80"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - node-proxy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
