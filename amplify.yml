version: 1
applications:
  - appRoot: client
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 22.22.0
            - nvm use 22.22.0
            - node -v
            - npm -v
            # npm ci fails when lockfile was generated on macOS (optional Linux deps differ)
            - npm install --no-audit --no-fund
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: build/client
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
      customHeaders:
        - pattern: "**/*"
          headers:
            - key: Cache-Control
              value: public, max-age=0, must-revalidate
      # Proxy API traffic to EC2 BFF. Explicit rules (with/without trailing slash)
      # must come BEFORE the SPA fallback or Amplify returns index.html for /auth/*.
      redirects:
        - source: /auth/signup
          target: http://3.85.101.177:3000/auth/signup
          status: "200"
        - source: /auth/signup/
          target: http://3.85.101.177:3000/auth/signup
          status: "200"
        - source: /auth/login
          target: http://3.85.101.177:3000/auth/login
          status: "200"
        - source: /auth/login/
          target: http://3.85.101.177:3000/auth/login
          status: "200"
        - source: /auth/logout
          target: http://3.85.101.177:3000/auth/logout
          status: "200"
        - source: /auth/logout/
          target: http://3.85.101.177:3000/auth/logout
          status: "200"
        - source: /auth/verify
          target: http://3.85.101.177:3000/auth/verify
          status: "200"
        - source: /auth/verify/
          target: http://3.85.101.177:3000/auth/verify
          status: "200"
        - source: /auth/resend-code
          target: http://3.85.101.177:3000/auth/resend-code
          status: "200"
        - source: /auth/resend-code/
          target: http://3.85.101.177:3000/auth/resend-code
          status: "200"
        - source: /auth/me
          target: http://3.85.101.177:3000/auth/me
          status: "200"
        - source: /auth/me/
          target: http://3.85.101.177:3000/auth/me
          status: "200"
        - source: /health
          target: http://3.85.101.177:3000/health
          status: "200"
        - source: /health/
          target: http://3.85.101.177:3000/health
          status: "200"
        - source: /<*>
          target: /index.html
          status: "404-200"
