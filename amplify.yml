version: 1
applications:
  - appRoot: client
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 22.22.0
            - nvm use 22.22.0
            - node -v
            - npm -v
            # npm ci fails when lockfile was generated on macOS (optional Linux deps differ)
            - npm install --no-audit --no-fund
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: build/client
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
      customHeaders:
        - pattern: "**/*"
          headers:
            - key: Cache-Control
              value: public, max-age=0, must-revalidate
      # Proxy /auth/* and /health to the HTTPS BFF on DuckDNS (must be before SPA fallback).
      redirects:
        - source: /auth/<*>
          status: "200"
          target: https://oppex.duckdns.org/auth/<*>
        - source: /health
          status: "200"
          target: https://oppex.duckdns.org/health
        - source: </^[^.]+$|\\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>
          status: "200"
          target: /index.html
