version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build/client
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: "**/*"
      headers:
        - key: Cache-Control
          value: public, max-age=0, must-revalidate

# Replace EC2_PUBLIC_IP with your EC2 public IP after the BFF is running.
redirects:
  - source: /auth/<*>
    target: http://EC2_PUBLIC_IP:3000/auth/<*>
    status: "200"
  - source: /health
    target: http://EC2_PUBLIC_IP:3000/health
    status: "200"
  - source: /<*>
    target: /index.html
    status: "404-200"
